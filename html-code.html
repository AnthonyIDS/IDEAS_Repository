<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>HTML Code Library | SPC</title>

<style>

:root {

  --spc-blue: #00406e;

  --spc-blue-dark: #002d4d;

  --light-bg: #f4f8fb;

  --card: #ffffff;

  --border: #d7e2ec;

  --text: #17324d;

}

body {

  margin: 0;

  font-family: Arial, sans-serif;

  background: var(--light-bg);

  color: var(--text);

}

/* HEADER */

header {

  background: linear-gradient(135deg, var(--spc-blue), var(--spc-blue-dark));

  color: white;

  padding: 40px 20px;

  text-align: center;

}

/* LAYOUT */

main {

  max-width: 1000px;

  margin: 40px auto;

  padding: 0 20px;

}

/* BUTTONS */

.button-group {

  display: flex;

  flex-wrap: wrap;

  gap: 12px;

  margin-bottom: 20px;

}

button {

  background: var(--spc-blue);

  color: white;

  border: none;

  padding: 10px 16px;

  border-radius: 999px;

  cursor: pointer;

  font-weight: bold;

}

button:hover {

  background: var(--spc-blue-dark);

}

/* CODE BOX */

.code-box {

  background: #1e1e1e;

  color: #eaeaea;

  padding: 20px;

  border-radius: 12px;

  white-space: pre-wrap;

  font-family: monospace;

  font-size: 0.9rem;

  position: relative;

  margin-bottom: 20px;

}

/* PREVIEW BOX */

.preview-box {

  background: white;

  border: 1px solid var(--border);

  padding: 20px;

  border-radius: 12px;

}

/* COPY BUTTON */

.copy-btn {

  position: absolute;

  top: 10px;

  right: 10px;

  background: #f2a900;

  border: none;

  padding: 6px 12px;

  border-radius: 8px;

  cursor: pointer;

  font-size: 0.8rem;

  font-weight: bold;

}

.copy-btn:hover {

  background: #d99200;

}

.label {

  font-weight: bold;

  margin: 10px 0;

  color: var(--spc-blue);

}

</style>

</head>

<body>

<header>

  <h1>HTML Code Library</h1>

  <p>Select a component to view code and preview</p>

</header>

<main>

  <div class="button-group">

    <button onclick="showCode('header')">Page Headers</button>

    <button onclick="showCode('student')">Student Example</button>

    <button onclick="showCode('line')">Horizontal Line</button>

  </div>

  <div class="label">Code</div>

  <div class="code-box" id="codeDisplay">

    Click a button to view code...

    <button class="copy-btn" onclick="copyCode()">Copy</button>

  </div>

  <div class="label">Preview (Canvas View)</div>

  <div class="preview-box" id="previewDisplay">

    Preview will appear here...

  </div>

</main>

<script>

const codeSnippets = {

  header: `<h2 style="color: #ffffff; background: #00406e; text-align: left; padding-left: 10px;"><strong>Discussion Prompt</strong></h2>`,

  student: `<div style="background: #e8f0f7; border-left: 6px solid #003366; padding: 20px; border-radius: 12px;">

    <h4 style="color: #003366; margin-top: 0;">Student Examples:</h4>

    <p><strong>Example 1 &ndash; With Author:</strong><br />Parsons, V. (2017, April 12). <em>Algae: The good, the bad and the possibilities</em>. Bay Soundings. Retrieved from http://baysoundings.com<br />This article discusses how algae is vital to the biosphere but Karenia Brevis, found in Red Tide, releases toxins that kill sea life like manatees and dolphins. Parsons is working on creating bio-fields to harvest algae for bio-fuels.</p>

</div>`,

  line: `<hr style="border: 1px solid #00406e;" />`

};

function showCode(type) {

  const code = codeSnippets[type];

  // Show raw code

  document.getElementById("codeDisplay").innerText = code;

  // Show rendered preview

  document.getElementById("previewDisplay").innerHTML = code;

}

function copyCode() {

  const text = document.getElementById("codeDisplay").innerText;

  navigator.clipboard.writeText(text);

  alert("Code copied!");

}

</script>

</body>

</html>

<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>HTML Code Library | SPC</title>

<style>

:root {

  --spc-blue: #00406e;

  --spc-blue-dark: #002d4d;

  --light-bg: #f4f8fb;

  --border: #d7e2ec;

  --text: #17324d;

}

body {

  margin: 0;

  font-family: Arial, sans-serif;

  background: var(--light-bg);

  color: var(--text);

}

header {

  background: linear-gradient(135deg, var(--spc-blue), var(--spc-blue-dark));

  color: white;

  padding: 40px 20px;

  text-align: center;

}

main {

  max-width: 1000px;

  margin: 40px auto;

  padding: 0 20px;

}

.button-group {

  display: flex;

  flex-wrap: wrap;

  gap: 12px;

  margin-bottom: 20px;

}

button {

  background: var(--spc-blue);

  color: white;

  border: none;

  padding: 10px 16px;

  border-radius: 999px;

  cursor: pointer;

  font-weight: bold;

}

button:hover {

  background: var(--spc-blue-dark);

}

.code-box {

  background: #1e1e1e;

  color: #eaeaea;

  padding: 20px;

  border-radius: 12px;

  white-space: pre-wrap;

  font-family: monospace;

  font-size: 0.9rem;

  position: relative;

  margin-bottom: 20px;

}

.preview-box {

  background: white;

  border: 1px solid var(--border);

  padding: 20px;

  border-radius: 12px;

}

.copy-btn {

  position: absolute;

  top: 10px;

  right: 10px;

  background: #f2a900;

  border: none;

  padding: 6px 12px;

  border-radius: 8px;

  cursor: pointer;

  font-size: 0.8rem;

  font-weight: bold;

}

.label {

  font-weight: bold;

  margin: 10px 0;

  color: var(--spc-blue);

}

</style>

</head>

<body>

<header>

  <h1>HTML Code Library</h1>

  <p>Select a component to view code and preview</p>

</header>

<main>

<div class="button-group">

  <button onclick="showCode('header')">Page Headers</button>

  <button onclick="showCode('student')">Student Example</button>

  <button onclick="showCode('line')">Horizontal Line</button>

  <button onclick="showCode('jeopardy')">Jeopardy</button>

</div>

<div class="label">Code</div>

<div class="code-box" id="codeDisplay">

  Click a button to view code...

  <button class="copy-btn" onclick="copyCode()">Copy</button>

</div>

<div class="label">Preview (Canvas View)</div>

<div class="preview-box" id="previewDisplay">

  Preview will appear here...

</div>

</main>

<script>

const codeSnippets = {

header: `<h2 style="color: #ffffff; background: #00406e; text-align: left; padding-left: 10px;"><strong>Discussion Prompt</strong></h2>`,

student: `<div style="background: #e8f0f7; border-left: 6px solid #003366; padding: 20px; border-radius: 12px;">

  <h4 style="color: #003366;">Student Examples:</h4>

  <p><strong>Example:</strong> Sample content here.</p>

</div>`,

line: `<hr style="border: 1px solid #00406e;" />`,

jeopardy: `<div style="display: flex; gap: 10px; background-color: black; padding: 10px; font-family: sans-serif;">

  <div style="flex: 1;">

    <h2 style="background-color: #060ce9; color: #fff; text-align: center; padding: 15px;"><strong>History</strong></h2>

    <div style="background-color: #060ce9; margin-bottom: 10px;">

      <details style="color: #ffcc00;">

        <summary style="font-size: 28px; text-align: center;"><strong>$100</strong></summary>

        <div style="color: white; padding: 10px; text-align: center;">

          <p><strong>The first US President.</strong></p>

          <details style="background: #fff; color: #000;">

            <summary><strong>Show Answer</strong></summary>

            <strong>George Washington</strong>

          </details>

        </div>

      </details>

    </div>

    <div style="background-color: #060ce9;">

      <details style="color: #ffcc00;">

        <summary style="font-size: 28px; text-align: center;"><strong>$200</strong></summary>

        <div style="color: white; padding: 10px; text-align: center;">

          <p><strong>Year the Magna Carta was signed.</strong></p>

          <details style="background: #fff; color: #000;">

            <summary><strong>Show Answer</strong></summary>

            <strong>1215</strong>

          </details>

        </div>

      </details>

    </div>

  </div>

</div>`

};

function showCode(type) {

  const code = codeSnippets[type];

  document.getElementById("codeDisplay").innerText = code;

  document.getElementById("previewDisplay").innerHTML = code;

}

function copyCode() {

  const text = document.getElementById("codeDisplay").innerText;

  navigator.clipboard.writeText(text);

  alert("Code copied!");

}

</script>

</body>

</html>
